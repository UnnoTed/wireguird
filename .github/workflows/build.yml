name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-${{ matrix.arch == 'arm64' && '22.04-arm' || '24.04' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y wireguard-tools libgtk-3-dev libayatana-appindicator3-dev resolvconf dpkg-dev

    - name: Build with shell scripts
      run: ./package.sh
      env:
        ARCH: ${{ matrix.arch }}

    - name: Clean build artifacts
      run: make clean

    - name: Build with Makefile
      run: make
      env:
        ARCH: ${{ matrix.arch }}

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: wireguird-${{ matrix.arch }}-deb
        path: build/wireguird_${{ matrix.arch }}.deb